# Render Blueprint for TechnoForge.
# Deploys the Vite build output (dist/) as a static site.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: technohub
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    # No SPA rewrite: this app has no client-side routing, and a catch-all
    # rewrite can interfere with serving hashed /assets/* files. Vite emits a
    # single index.html plus fingerprinted assets, which are served directly.
